name: Atualizar drops

on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 min (horário UTC)
  workflow_dispatch: {}       # botão "Run workflow" pra rodar na hora

permissions:
  contents: write

concurrency:
  group: update-drops
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar drops
        run: python checker.py

      - name: Commitar dados
        run: |
          git config user.name "drops-bot"
          git config user.email "drops-bot@users.noreply.github.com"
          git add data/drops.json
          git diff --staged --quiet || git commit -m "drops $(date -u +%FT%TZ)"
          git push
